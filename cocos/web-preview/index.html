<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Findscape Web Preview</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Mode controls">
        <div>
          <h1>Findscape Preview</h1>
          <p id="modeDescription">Loading demo config...</p>
        </div>
        <label class="mode-picker">
          <span>Mode</span>
          <select id="modeSelect"></select>
        </label>
      </section>

      <section class="stage">
        <canvas id="mapCanvas" width="1200" height="800" aria-label="Demo map preview"></canvas>
        <aside class="hud" aria-label="Round HUD">
          <div class="stat">
            <span>Found</span>
            <strong id="foundLabel">0 / 0</strong>
          </div>
          <div class="stat">
            <span>Score</span>
            <strong id="scoreLabel">0</strong>
          </div>
          <div class="target-list" id="targetList"></div>
          <button id="resetButton" type="button">Reset</button>
          <section class="asset-panel" aria-label="Asset readiness">
            <div class="asset-panel-header">
              <span>Asset Batch</span>
              <strong id="assetBatchLabel">Loading</strong>
            </div>
            <div class="asset-stats" id="assetStats"></div>
            <div class="asset-list" id="assetList"></div>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="./preview.js"></script>
  </body>
</html>
